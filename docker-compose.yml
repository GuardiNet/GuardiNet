version: '3.8'

services:
  web:
    build: .
    container_name: guardinet_web
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      # These use env substitution, passing values from the .env file if available, 
      # or using the placeholder default value after the :-
      - FLASK_ENV=production
      - DB_USER=${DB_USER:-guardinet_user}
      - DB_PASSWORD=${DB_PASSWORD:-ChangeMePlease123!}
      - DB_HOST=db
      - DB_NAME=${DB_NAME:-guardinet}
      - SECRET_KEY=${SECRET_KEY:-ChangeThisSecretKeyBeforeDeploy_1234!}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - guardinet_network

  db:
    image: mysql:8.0
    container_name: guardinet_db
    restart: always
    environment:
      # Make sure MYSQL_PASSWORD is identical to DB_PASSWORD for successful auth
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-ChangeMeRoot123!}
      - MYSQL_DATABASE=${DB_NAME:-guardinet}
      - MYSQL_USER=${DB_USER:-guardinet_user}
      - MYSQL_PASSWORD=${DB_PASSWORD:-ChangeMePlease123!}
    volumes:
      - db_data:/var/lib/mysql
      # Initialise la base avec le script SQL dès la création
      - ./database/guardinet_init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    networks:
      - guardinet_network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -uroot -pdocker-compose.ymlMYSQL_ROOT_PASSWORD -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  guardinet_network:
    driver: bridge

volumes:
  db_data:
