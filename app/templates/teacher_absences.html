{% extends "base.html" %}

{% block title %}Absences - Professeur{% endblock %}

{% block extra_css %}
<style>
    .teacher-container { max-width: 1000px; margin: 0 auto; padding: 20px; }
    .filters { background: white; padding: 20px; border: 2px solid #555; box-shadow: 4px 4px 0 #555; margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap; }
    .filters select, .filters input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; flex-grow: 1; }
    .filters button { padding: 10px 20px; background: #c1d3c5; border: 2px solid #555; cursor: pointer; font-weight: bold; }
    .filters button:hover { background: #a5bdab; }
    
    .students-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
    
    .student-card {
        background: white; border: 4px solid #2e7d32; border-radius: 8px; padding: 15px; text-align: center; cursor: pointer;
        transition: all 0.2s; box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .student-card.absent { border-color: #c62828; background-color: #ffebee; }
    
    .student-avatar { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; border: 2px solid #ccc; }
    .student-name { font-weight: bold; font-size: 0.9rem; }
    
    .empty-msg { width: 100%; text-align: center; font-size: 1.1rem; color: #666; font-style: italic; }
</style>
{% endblock %}

{% block content %}
<div class="teacher-container">
    <h2 class="edt-main-title" style="font-size: 3rem; text-align: center; margin-bottom: 30px;">Appel - Absences</h2>
    
    <div class="filters">
        <input type="date" id="dateSelect" required onchange="loadSchedules()">
        
        <!-- Dropdown qui se remplit avec les créneaux trouvés pour la date -->
        <select id="scheduleSelect" onchange="resetGrid()">
            <option value="">Sélectionnez un cours pour cette date...</option>
        </select>
        
        <button onclick="loadStudents()">Charger la liste</button>
    </div>
    
    <div id="studentsGrid" class="students-grid">
        <div class="empty-msg">Veuillez sélectionner un cours et charger la liste pour faire l'appel.</div>
    </div>
    
    <div style="text-align: center; margin-top: 30px; display: none;" id="confirmContainer">
        <button onclick="confirmRollCall()" class="btn-submit" style="padding: 15px 30px; font-size: 1.2rem; background: #2e7d32; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">Confirmer l'appel</button>
    </div>
</div>


{% endblock %}
    <script src="{{ url_for('static', filename='js/teacher_absences.js') }}"></script>
