{% extends "base.html" %}

{% block title %}Notes{% endblock %}

{% block extra_css %}
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/notes.css') }}">
{% endblock %}

{% block content %}
  <div class="notes-container">
    <h1 class="page-title">Notes</h1>

    <section class="semester-section">
      <div class="semester-banner sem1" id="banner1">
        <div class="banner-inner">
          <span class="banner-title">Relevé de Notes</span>
          <div class="banner-arrow">
            <svg width="14" height="9" viewBox="0 0 14 9" fill="none"
                 stroke="#2d3748" stroke-width="2.2" stroke-linecap="round">
              <path d="M1 1l6 6 6-6"/>
            </svg>
          </div>
        </div>
      </div>
      <div class="semester-cards" id="cards1"></div>
    </section>
  </div>
{% endblock %}

{% block extra_js %}
  <script>
    const studentGradesData = {{ grades_data | tojson | safe }};
  </script>
  <script src="{{ url_for('static', filename='js/notes.js') }}"></script>
{% endblock %}
